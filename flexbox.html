<!DOCTYPE html>
<html>
    <head>
        <style>
            .box{
                height: 60px;
                display: flex;
                flex-direction: row;
                align-items: center;
                background-color: green;
            }

            .home{
                margin-left: 10px;
                color: white;
            }

            .input-box{
                flex: 1;
                margin-left: 45px;
                margin-right: 45px;

            }

            .btn-box{
                margin-right: 10px;
            }

            p{
                margin-top: 0;
                margin-bottom: 0;
            }

            input{
                width: 100%;
                border-radius: 20px;
            }
        </style>
     </head>
    <body>
        <div class="box">
            <div class="home">
                <p>Home</p>
            </div>
            <div class="input-box">
                <input type="text" placeholder="Seach">
            </div>
            <div class="btn-box">
                <button style="color: white; background-color: green; border: 1px solid white;">Dowland</button>
            </div>
        </div>
</html>
